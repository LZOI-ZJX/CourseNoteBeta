name: Deploy Quarto sites to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render sites
        run: |
          set -euo pipefail
          mkdir -p _publish
          cp index.html _publish/
          (cd pde && quarto render --output-dir ../_publish/pde)
          (cd fuzzy && quarto render --output-dir ../_publish/fuzzy)
          (cd topology && quarto render --output-dir ../_publish/topology)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
