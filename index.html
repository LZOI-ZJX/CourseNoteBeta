<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CourseNoteBeta · 课程笔记导航</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #5c6370;
      --accent: #2563eb;
      --border: #e3e6eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121418;
        --card: #1a1d23;
        --text: #eef1f6;
        --muted: #a8b0bd;
        --accent: #60a5fa;
        --border: #2c323c;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    header {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 1rem;
    }
    h1 { font-size: 1.65rem; margin: 0 0 0.35rem; font-weight: 650; }
    p.lead { margin: 0; color: var(--muted); font-size: 0.98rem; }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 1.25rem 3rem;
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      main { grid-template-columns: repeat(3, 1fr); }
    }
    a.card {
      display: block;
      padding: 1.25rem 1.35rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    a.card:hover {
      border-color: var(--accent);
      box-shadow: 0 6px 24px rgba(37, 99, 235, 0.12);
    }
    a.card h2 {
      margin: 0;
      font-size: 1.08rem;
      color: var(--accent);
    }
    footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.25rem 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>CourseNoteBeta</h1>
    <p class="lead">课程讲义索引 · GitHub Pages</p>
  </header>
  <main>
    <a class="card" href="pde/">
      <h2>偏微分方程数值解</h2>
    </a>
    <a class="card" href="fuzzy/">
      <h2>模糊数学</h2>
    </a>
    <a class="card" href="topology/">
      <h2>拓扑学讲义</h2>
    </a>
  </main>
  <footer>
    源码仓库：<a href="https://github.com/LZOI-ZJX/CourseNoteBeta">LZOI-ZJX/CourseNoteBeta</a>
  </footer>
</body>
</html>
